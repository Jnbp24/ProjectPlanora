<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Planora - Categories</title>
    <link rel="stylesheet" href="styles/base.css">
    <link rel="stylesheet" href="styles/base_dashboard.css">
    <link rel="stylesheet" href="styles/category.css">
    <link rel="stylesheet" href="styles/micromodal.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&icon_names=check,close,delete,edit,folder_open"/>
    <script defer src="https://unpkg.com/micromodal/dist/micromodal.min.js"></script>
    <script defer src="scripts/category.js"></script>
</head>
<body class="page-dashboard">
  <main class="dashboard">
    <aside class="sidebar">
      <div>
          <div class="brand">
              <a href="dashboard.html" style="display:flex;align-items:center;gap:12px;text-decoration:none;color:inherit;">
                  <img class="brand-logo" src="images/planora-logo.png" alt="Planora logo">
                  <span class="brand-text">Planora</span>
              </a>
          </div>
        <ul class="nav-list">
          <li class="nav-item"><a href="dashboard.html">Dashboard</a></li>
          <li class="nav-item"><a href="tasks.html">My tasks</a></li>
          <li class="nav-item active"><a href="category.html">Categories</a></li>
          <li class="nav-item"><a href="calendar_year.html">Calender Years</a></li>
          <li class="nav-item"><a href="user.html">Users</a></li>
        </ul>
      </div>

      <div class="sidebar-bottom">
        <a class="sidebar-link" href="#">Settings</a>
        <a class="sidebar-link" href="index.html">Log out</a>
      </div>
    </aside>

    <!-- Categories tab -->
    <section class="content tab-content" id="tab-categories">
        <div class="category-create-bar">
            <input
              class="category-name-input"
              type="text"
              id="category-name"
              placeholder="Enter category name.."
              maxlength="40"
            >
            <input
              class="category-content-input"
              type="text"
              id="category-content"
              placeholder="Enter category content.."
              maxlength="200"
            >
            <div class="color-picker-wrapper">
                <label class="color-picker-label" for="category-color">Color</label>
                <input type="color" id="category-color" class="color-picker-input" value="#2f80ed">
            </div>
            <button class="add-category-btn" id="add-category-btn" type="button">+ Add category</button>
        </div>

        <div class="category-list" id="category-list">
            <div class="category-empty-state" id="category-empty">
                <span class="material-symbols-outlined category-empty-icon">folder_open</span>
                <p>No categories yet. Create one above to get started.</p>
            </div>
        </div>
    </section>
  </main>
  <!-- MicroModal -->
  <div class="modal micromodal-slide" id="modal-action" aria-hidden="true">
      <div class="modal__overlay" tabindex="-1" data-micromodal-close>
          <div class="modal__container" role="dialog" aria-modal="true" aria-labelledby="modal-action-title">
              <header class="modal__header">
                  <h2 class="modal__title" id="modal-action-title">Delete [something]?</h2>
                  <button class="modal__close" aria-label="Close modal" data-micromodal-close></button>
              </header>
              <main class="modal__content" id="modal-action-content">
                  <p>Are you sure? This cannot be undone.</p>
              </main>
              <footer class="modal__footer">
                  <button class="modal__btn" data-micromodal-close>Cancel</button>
                  <button class="modal__btn modal__btn-primary" id="confirm-action-btn">[Action]</button>
              </footer>
          </div>
      </div>
  </div>
</body>
</html>
