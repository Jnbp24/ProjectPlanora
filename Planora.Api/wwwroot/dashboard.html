<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Project Planora - Dashboard</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="page-dashboard">
  <main class="dashboard">
    <aside class="sidebar">
      <div>
        <div class="brand">
          <img class="brand-logo" src="planora-logo.png" alt="Project Planora logo">
          <span class="brand-text">Project Planora</span>
        </div>
        <ul class="nav-list">
          <li class="nav-item active"><a href="#">Dashboard</a></li>
          <li class="nav-item"><a href="#">My tasks</a></li>
          <li class="nav-item"><a href="#">Projects</a></li>
        </ul>
      </div>

      <div class="sidebar-bottom">
        <a class="sidebar-link" href="#">Settings</a>
        <a class="sidebar-link" href="index.html">Log out</a>
      </div>
    </aside>

    <section class="content">
      <div class="topbar">
        <input class="search-input" type="search" placeholder="Search">
        <button class="new-task-btn" type="button">+ New task</button>
        <button class="profile-btn" type="button" aria-label="Profile">A</button>
      </div>
    </section>
  </main>
</body>
</html>
