<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Planora - Dashboard</title>
    <link rel="stylesheet" href="styles/base.css">
    <link rel="stylesheet" href="styles/styles.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&icon_names=delete,save" />
    <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles/micromodal.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/tom-select/dist/css/tom-select.css">
    <script defer src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js"></script>
    <script defer src="https://unpkg.com/micromodal/dist/micromodal.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/jwt-decode/build/jwt-decode.min.js"></script>
    <script defer src="scripts/decode_token.js"></script>
    <script defer src="scripts/calendar.js"></script>
    <script defer src="scripts/task.js"></script>
    <script defer src="scripts/delete_task.js"></script>
    <script defer src="scripts/update_task.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/tom-select/dist/js/tom-select.complete.min.js"></script>
    <script defer src="scripts/assign_user_dropdown.js"></script>

</head>
<body class="page-dashboard">
  <main class="dashboard">
    <aside class="sidebar">
      <div>
          <div class="brand">
              <a href="dashboard.html" style="display:flex;align-items:center;gap:12px;text-decoration:none;color:inherit;">
                  <img class="brand-logo" src="images/planora-logo.png" alt="Planora logo">
                  <span class="brand-text">Planora</span>
              </a>
          </div>
        <ul class="nav-list">
          <li class="nav-item active"><a href="dashboard.html">Dashboard</a></li>
          <li class="nav-item"><a href="tasks.html">My tasks</a></li>
          <li class="nav-item"><a href="category.html">Categories</a></li>
          <li class="nav-item"><a href="calendar_year.html">Calender Years</a></li>
          <li class="nav-item"><a href="user.html">Users</a></li>
        </ul>
      </div>

      <div class="sidebar-bottom">
        <a class="sidebar-link" href="#">Settings</a>
        <a class="sidebar-link" href="index.html">Log out</a>
      </div>
    </aside>

    <!-- Dashboard tab -->
    <section class="content">
        <div class="topbar">
            <div class="taskquickmenu">
                <input type="text" placeholder="Enter task name.." class="task-name" />
                <input type="text" placeholder="Enter task content.." class="task-content" />
                <input type="date" title="Select deadline" class="task-date" />
                <label class="no-deadline-toggle">
                    <input type="checkbox" id="no-deadline">  No deadline
                </label>
                <select class="task-category">
                    <option value="" disabled selected hidden>Choose a category</option>
                </select>
                <select id="task-assignees" multiple placeholder="Assign to…"></select>
            </div>
            <span class="material-symbols-outlined invisible restricted" id="delete_task_btn">
                delete
            </span>
            <span class="material-symbols-outlined invisible" id="update_task_btn">
                save
            </span>
            <button class="new-task-btn" type="button">+ New task</button>
        </div>
        <div id="calendar"></div>
    </section>
  </main>
  <!-- MicroModal -->
  <div class="modal micromodal-slide" id="modal-action" aria-hidden="true">
      <div class="modal__overlay" tabindex="-1" data-micromodal-close>
          <div class="modal__container" role="dialog" aria-modal="true" aria-labelledby="modal-action-title">
              <header class="modal__header">
                  <h2 class="modal__title" id="modal-action-title">Delete [something]?</h2>
                  <button class="modal__close" aria-label="Close modal" data-micromodal-close></button>
              </header>
              <main class="modal__content" id="modal-action-content">
                  <p>Are you sure? This cannot be undone.</p>
              </main>
              <footer class="modal__footer">
                  <button class="modal__btn" data-micromodal-close>Cancel</button>
                  <button class="modal__btn modal__btn-primary" id="confirm-action-btn">[Action]</button>
              </footer>
          </div>
      </div>
  </div>
</body>
</html>
