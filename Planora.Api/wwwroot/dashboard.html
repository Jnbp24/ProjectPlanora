<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Planora - Dashboard</title>
    <link rel="stylesheet" href="styles/styles.css">
    <link href="https://unpkg.com/vis-timeline@latest/styles/vis-timeline-graph2d.min.css" rel="stylesheet">
    <script src="https://unpkg.com/vis-timeline@latest/standalone/umd/vis-timeline-graph2d.min.js"></script>
    <script defer src="scripts/calendar.js"></script>
    <script defer src="scripts/task.js"></script>
</head>
<body class="page-dashboard">
  <main class="dashboard">
    <aside class="sidebar">
      <div>
        <div class="brand">
          <img class="brand-logo" src="images/planora-logo.png" alt="Project Planora logo">
          <span class="brand-text">Project Planora</span>
        </div>
        <ul class="nav-list">
          <li class="nav-item active"><a href="#">Dashboard</a></li>
          <li class="nav-item"><a href="#">My tasks</a></li>
          <li class="nav-item"><a href="#">Projects</a></li>
        </ul>
      </div>

      <div class="sidebar-bottom">
        <a class="sidebar-link" href="#">Settings</a>
        <a class="sidebar-link" href="index.html">Log out</a>
      </div>
    </aside>

    <section class="content">
        <div class="topbar">
            <div class="taskquickmenu">
                <input type="text" placeholder="Enter task name.." class="task-name" />
                <input type="text" placeholder="Enter task content.." class="task-content" />

                <select class="task-category">
                    <option value="" disabled selected hidden >Choose a category</option>
                </select>

            </div>
            <button class="new-task-btn" type="button">+ New task</button>
            <button class="profile-btn" type="button" aria-label="Profile">A</button>
        </div>
        <div id="timeline"></div>
    </section>
  </main>
</body>
</html>
