<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Planora - Dashboard</title>
    <link rel="stylesheet" href="styles/styles.css">
    <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.css" rel="stylesheet">
    <script defer src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js"></script>
    <script defer src="scripts/calendar.js"></script>
    <script defer src="scripts/task.js"></script>
    <script defer src="scripts/category.js"></script>

</head>
<body class="page-dashboard">
  <main class="dashboard">
    <aside class="sidebar">
      <div>
        <div class="brand">
          <img class="brand-logo" src="images/planora-logo.png" alt="Planora logo">
          <span class="brand-text">Planora</span>
        </div>
        <ul class="nav-list">
          <li class="nav-item active"><a href="dashboard.html">Dashboard</a></li>
          <li class="nav-item"><a href="tasks.html">My tasks</a></li>
          <li class="nav-item"><a href="category.html">Categories</a></li>
          <li class="nav-item"><a href="project.html">Projects</a></li>
        </ul>
      </div>

      <div class="sidebar-bottom">
        <a class="sidebar-link" href="#">Settings</a>
        <a class="sidebar-link" href="index.html">Log out</a>
      </div>
    </aside>

    <!-- Dashboard tab -->
    <section class="content">
        <div class="topbar">
            <div class="taskquickmenu">
                <input type="text" placeholder="Enter task name.." class="task-name" />
                <input type="text" placeholder="Enter task content.." class="task-content" />
                <input type="date" title="Select deadline" class="task-date" />

                <select class="task-category">
                    <option value="" disabled selected hidden >Choose a category</option>
                </select>
            </div>
            <button class="new-task-btn" type="button">+ New task</button>
            <button class="profile-btn" type="button" aria-label="Profile">A</button>
        </div>
        <div id="calendar"></div>
    </section>

    <!-- Categories tab -->
    <section class="content tab-content" id="tab-categories" style="display:none;">
        <div class="topbar">
            <input class="search-input" type="search" placeholder="Search categories...">
            <button class="profile-btn" type="button" aria-label="Profile" style="margin-left:auto;">A</button>
        </div>

        <div class="category-create-bar">
            <input
              class="category-name-input"
              type="text"
              id="category-name"
              placeholder="Category name"
              maxlength="40"
            >
            <div class="color-picker-wrapper">
                <label class="color-picker-label" for="category-color">Color</label>
                <input type="color" id="category-color" class="color-picker-input" value="#2f80ed">
            </div>
            <button class="add-category-btn" id="add-category-btn" type="button">+ Add category</button>
        </div>

        <div class="category-list" id="category-list">
            <div class="category-empty-state" id="category-empty">
                <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#bbb" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
                </svg>
                <p>No categories yet. Create one above to get started.</p>
            </div>
        </div>
    </section>
  </main>
</body>
</html>
