<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Change Password</title>
    <link rel="stylesheet" href="styles/base.css">
    <link rel="stylesheet" href="styles/styles.css">
</head>
<body class="page-login">
    <div class="panel">
        <div class="left-side">
            <div class="brand">
                <img src="images/planora-logo.png" alt="Planora Logo" class="brand-logo">
                <span class="brand-text">Planora</span>
            </div>
        </div>
        <div class="right-side">
            <h1>Change Password</h1>
            <p>Enter your current password and your new password below.</p>
            <form id="new-password-form" autocomplete="off">
                <div>
                    <label for="old-password">Current Password</label>
                    <input type="password" id="old-password" name="old-password" required placeholder="Enter current password">
                </div>
                <div class="input-margin">
                    <label for="new-password">New Password</label>
                    <input type="password" id="new-password" name="new-password" minlength="8" required placeholder="Enter new password">
                </div>
                <div class="input-margin">
                    <label for="confirm-password">Confirm New Password</label>
                    <input type="password" id="confirm-password" name="confirm-password" minlength="8" required placeholder="Confirm new password">
                </div>
                <div id="error-message" class="reset-error"></div>
                <div id="success-message" class="reset-success"></div>
                <button type="submit">Change Password</button>
            </form>
        </div>
    </div>
    <script src="scripts/password_change.js" defer></script>
</body>
</html>
