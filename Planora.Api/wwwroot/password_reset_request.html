<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Request Password Reset</title>
    <link rel="stylesheet" href="styles/base.css">
    <link rel="stylesheet" href="styles/styles.css">
</head>
<body class="page-login">
    <div class="panel">
        <div class="left-side">
            <div class="brand">
                <img src="images/planora-logo.png" alt="Planora Logo" class="brand-logo">
                <span class="brand-text">Planora</span>
            </div>
        </div>
        <div class="right-side">
            <h1>Forgot Password?</h1>
            <p>Enter your email to receive a password reset link.</p>
            <form id="email-reset-form" autocomplete="off">
                <div>
                    <label for="reset-email">Email</label>
                    <input type="email" id="reset-email" name="reset-email" required placeholder="Enter your email">
                </div>
                <div id="email-reset-error" class="reset-error"></div>
                <div id="email-reset-success" class="reset-success"></div>
                <button type="submit">Send Reset Link</button>
            </form>
        </div>
    </div>
    <script src="scripts/password_reset_request.js" defer></script>
</body>
</html>
