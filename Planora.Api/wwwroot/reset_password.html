<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password</title>
    <link rel="stylesheet" href="styles/base.css">
    <link rel="stylesheet" href="styles/styles.css">
</head>
<body class="page-login">
    <div class="panel">
        <div class="left-side">
            <div class="brand">
                <img src="images/planora-logo.png" alt="Planora Logo" class="brand-logo">
                <span class="brand-text">Planora</span>
            </div>
        </div>
        <div class="right-side">
            <h1>Reset Password</h1>
            <p>Enter your new password below.</p>
            <form id="reset-password-form" autocomplete="off">
                <div>
                    <label for="password">New Password</label>
                    <input type="password" id="password" name="password" minlength="8" required placeholder="Enter new password">
                </div>
                <div class="input-margin">
                    <label for="confirm-password">Confirm Password</label>
                    <input type="password" id="confirm-password" name="confirm-password" minlength="8" required placeholder="Confirm new password">
                </div>
                <div id="reset-error" class="reset-error"></div>
                <div id="reset-success" class="reset-success"></div>
                <button type="submit">Reset Password</button>
            </form>
        </div>
    </div>
    <script src="scripts/reset_password.js" defer></script>
</body>
</html>
