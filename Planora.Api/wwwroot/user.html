<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Planora - Users</title>
    <link rel="stylesheet" href="styles/base.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&icon_names=check,close,delete,edit,folder_open"/>    
    <link rel="stylesheet" href="styles/user.css">
    <link rel="stylesheet" href="styles/micromodal.css">
    <script defer src="https://unpkg.com/micromodal/dist/micromodal.min.js"></script>
    <script defer src="scripts/user.js"></script>

</head>
<body class="page-dashboard">
  <main class="dashboard">
    <aside class="sidebar">
      <div>
        <div class="brand">
          <img class="brand-logo" src="images/planora-logo.png" alt="Planora logo">
          <span class="brand-text">Planora</span>
        </div>
        <ul class="nav-list">
          <li class="nav-item"><a href="dashboard.html">Dashboard</a></li>
          <li class="nav-item"><a href="tasks.html">My tasks</a></li>
          <li class="nav-item"><a href="category.html">Categories</a></li>
          <li class="nav-item"><a href="calender_year.html">Calender Years</a></li>
          <li class="nav-item active"><a href="user.html">Users</a></li>
        </ul>
      </div>

      <div class="sidebar-bottom">
        <a class="sidebar-link" href="#">Settings</a>
        <a class="sidebar-link" href="index.html">Log out</a>
      </div>
    </aside>

    <!-- Users tab -->
    <section class="content tab-content" id="tab-categories">
        <div class="user-send-invitation-bar">
            <input
              class="user-email-input"
              type="text"
              id="user-email"
              placeholder="Enter email.."
              maxlength="40"
            >
            <button class="user-send-invitation-btn" id="user-send-invitation-btn" type="button">+ Send invitation</button>
        </div>

        <div class="user-list" id="user-list">
            <div class="user-empty-state" id="user-empty">
                <span class="material-symbols-outlined user-empty-icon">folder_open</span>
                <p>No users yet. Send an invitation to a user for sign-up.</p>
            </div>
        </div>
    </section>
  </main>
  <div class="modal micromodal-slide" id="modal-action" aria-hidden="true">
      <div class="modal__overlay" tabindex="-1" data-micromodal-close>
          <div class="modal__container" role="dialog" aria-modal="true" aria-labelledby="modal-action-title">
              <header class="modal__header">
                  <h2 class="modal__title" id="modal-action-title">Delete [something]?</h2>
                  <button class="modal__close" aria-label="Close modal" data-micromodal-close></button>
              </header>
              <main class="modal__content" id="modal-action-content">
                  <p>Are you sure? This cannot be undone.</p>
              </main>
              <footer class="modal__footer">
                  <button class="modal__btn" data-micromodal-close>Cancel</button>
                  <button class="modal__btn modal__btn-primary" id="confirm-action-btn">[Action]</button>
              </footer>
          </div>
      </div>
  </div>

  <div class="modal micromodal-slide" id="modal-invitation" aria-hidden="true">
      <div class="modal__overlay" tabindex="-1" data-micromodal-close>
          <div class="modal__container" role="dialog" aria-modal="true" aria-labelledby="modal-invitation-title">
              <header class="modal__header">
                  <h2 class="modal__title" id="modal-invitation-title">Send Invitation</h2>
                  <button class="modal__close" aria-label="Close modal" data-micromodal-close></button>
              </header>
              <main class="modal__content" id="modal-invitation-content">
                  <div class="form-group">
                      <label for="invitation-first-name">First Name</label>
                      <input type="text" id="invitation-first-name" placeholder="Enter first name" maxlength="50">
                  </div>
                  <div class="form-group">
                      <label for="invitation-last-name">Last Name</label>
                      <input type="text" id="invitation-last-name" placeholder="Enter last name" maxlength="50">
                  </div>
              </main>
              <footer class="modal__footer">
                  <button class="modal__btn" data-micromodal-close>Cancel</button>
                  <button class="modal__btn modal__btn-primary" id="invitation-ok-btn">OK</button>
              </footer>
          </div>
      </div>
  </div>
</body>
</html>
