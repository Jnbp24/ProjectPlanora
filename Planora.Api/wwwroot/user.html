<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Planora - Users</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&icon_names=check,close,delete,edit,folder_open"/>    
    <link rel="stylesheet" href="styles/user.css">
    <script defer src="scripts/user.js"></script>

</head>
<body class="page-dashboard">
  <main class="dashboard">
    <aside class="sidebar">
      <div>
        <div class="brand">
          <img class="brand-logo" src="images/planora-logo.png" alt="Planora logo">
          <span class="brand-text">Planora</span>
        </div>
        <ul class="nav-list">
          <li class="nav-item"><a href="dashboard.html">Dashboard</a></li>
          <li class="nav-item"><a href="tasks.html">My tasks</a></li>
          <li class="nav-item"><a href="category.html">Categories</a></li>
          <li class="nav-item"><a href="project.html">Projects</a></li>
          <li class="nav-item active"><a href="user.html">Users</a></li>
        </ul>
      </div>

      <div class="sidebar-bottom">
        <a class="sidebar-link" href="#">Settings</a>
        <a class="sidebar-link" href="index.html">Log out</a>
      </div>
    </aside>

    <!-- Users tab -->
    <section class="content tab-content" id="tab-categories">
        <div class="user-send-invitation-bar">
            <input
              class="user-email-input"
              type="text"
              id="user-email"
              placeholder="Enter email.."
              maxlength="40"
            >
            <button class="user-send-invitation-btn" id="user-send-invitation-btn" type="button">+ Send invitation</button>
        </div>

        <div class="user-list" id="user-list">
            <div class="user-empty-state" id="user-empty">
                <span class="material-symbols-outlined user-empty-icon">folder_open</span>
                <p>No users yet. Send an invitation to a user for sign-up.</p>
            </div>
        </div>
    </section>
  </main>
</body>
</html>
