$kind: http-request
method: PUT
url: '{{baseUrl}}/api/User/:id'
order: 3000
headers:
  - key: Content-Type
    value: application/json
pathVariables:
  - key: id
    value: user-1
body:
  type: json
  content: |-
    {
      "Id": "user-1",
      "FirstName": "Jonas",
      "LastName": "Petersen",
      "Email": "jonas@example.com",
      "Tovholder": true
    }
